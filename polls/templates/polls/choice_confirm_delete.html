{% extends 'base.html' %}

{% block title %}Seçenek Sil - Stellar Polls{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto py-20 font-outfit" data-aos="zoom-in">
    <div class="bg-base-100 border-[3px] border-error/10 shadow-[20px_20px_0px_0px_rgba(255,0,0,0.02)] rounded-[2.5rem] p-10 text-center">
        <div class="w-16 h-16 rounded-2xl bg-error/5 flex items-center justify-center text-error mx-auto mb-8">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </div>

        <h2 class="text-3xl font-extrabold tracking-tighter text-base-content mb-4 leading-tight">
            Seçeneği Sil
        </h2>
        
        <p class="text-sm font-bold text-base-content/40 uppercase tracking-widest leading-relaxed mb-8">
            "<span class="text-base-content">{{ object.choice_text }}</span>" SEÇENEĞİNİ VE BU SEÇENEĞE VERİLEN TÜM OYLARI SİLMEK ÜZERESİNİZ.
        </p>

        <form method="post" action="" class="flex flex-col sm:flex-row gap-6">
            {% csrf_token %}
            <button type="submit" class="w-full py-4 bg-red-500 text-white rounded-xl font-black text-sm tracking-widest uppercase hover:bg-red-600 transition-all">
                SİL
            </button>
            <a href="javascript:history.back()" class="w-full py-4 border border-white/10 text-slate-500 hover:text-white rounded-xl font-black text-sm tracking-widest uppercase transition-all flex items-center justify-center">
                VAZGEÇ
            </a>
        </form>
    </div>
</div>
{% endblock %}
